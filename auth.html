<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALTO — Вход / Регистрация</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header id="header"></header>

  <main>
    <div id="auth-container">

      <!-- Бренд-полоска -->
      <div class="auth-brand-bar">
        <span class="brand-name">ALTO</span>
        <p>Войдите, чтобы сохранять избранное<br>и отслеживать заказы</p>
      </div>

      <div class="auth-body">
        <!-- Вкладки -->
        <div class="auth-tabs">
          <button id="show-login">Вход</button>
          <button id="show-register">Регистрация</button>
        </div>

        <!-- Форма входа -->
        <div id="login-form" class="auth-form">
          <h3>Войти в аккаунт</h3>
          <div class="form-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" placeholder="you@example.com">
          </div>
          <div class="form-group">
            <label for="login-password">Пароль</label>
            <input type="password" id="login-password" placeholder="Введите пароль">
          </div>
          <p id="login-error" class="error-message"></p>
          <button id="login-btn" class="btn btn-primary btn-full">Войти</button>
        </div>

        <!-- Форма регистрации -->
        <div id="register-form" class="auth-form" style="display:none;">
          <h3>Создать аккаунт</h3>
          <div class="form-group">
            <label for="reg-name">Имя</label>
            <input type="text" id="reg-name" placeholder="Ваше имя">
          </div>
          <div class="form-group">
            <label for="reg-email">Email</label>
            <input type="email" id="reg-email" placeholder="you@example.com">
          </div>
          <div class="form-group">
            <label for="reg-password">Пароль</label>
            <input type="password" id="reg-password" placeholder="Минимум 6 символов">
          </div>
          <p id="reg-error" class="error-message"></p>
          <button id="register-btn" class="btn btn-primary btn-full">Зарегистрироваться</button>
        </div>
      </div>

    </div>
  </main>

  <footer id="footer"></footer>

  <script src="js/models.js"></script>
  <script src="js/common.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
